## case settings
# kcu_mass and tether.diameter are now defined in system.yml (awesIO format)
# starting_from_sim_subdir: depower_p0000mm_steer_p0000mm
is_with_gravity: !!bool false
is_with_aero_bridle: !!bool true
is_with_aero_tether: !!bool true
is_run_only_1_time_step: !!bool false
is_with_initial_point_velocity: !!bool false
is_with_forcing_symmetry: !!bool false
initial_geometry_rotation_deg: !!float 0.0

## system model initial conditions
angle_elevation_deg: !!float 0.0
angle_azimuth_deg: !!float 0.0
angle_course_deg: !!float 90.0
speed_radial: !!float 1
distance_radial: !!float 220.0
wind_speed_wind_ref: !!float 6
timeder_speed_tangential: !!float 0.0
timeder_speed_radial: !!float 0.0

## actuation settings
power_tape_extension_step: !!float 0.05 
power_tape_final_extension: !!float 0.0 #0.3 #0.05
steering_tape_extension_step: !!float 0.05
steering_tape_final_extension: !!float 0.0

## output settings
is_with_initial_structure_plot: !!bool false
is_with_coupling_plot_per_iteration: !!bool false
is_with_struc_plot_per_iteration: !!bool false
is_with_aero_plot_per_iteration: !!bool false
is_with_final_plot: !!bool true
is_save_geometry_snapshots: !!bool true

## aerodynamic
aerodynamic:
  n_aero_panels_per_struc_section: !!int 3
  spanwise_panel_distribution: !!str 'uniform'
  max_iterations: !!int 1500
  allowed_error: !!float 2e-6
  relaxation_factor: !!float 0.025
  reference_point: !!seq [0.0, 0.0, 0.0]

## quasi-steady trim optimization (used by aero_structural_solver with aero_solve_type='qsm')
# Controls the convergence and search criteria for finding trim equilibrium
quasi_steady_trim:
  # Moment balance tolerance [N·m]. Trim is achieved when moments are below this.
  # Tighter = more accurate trim but slower optimization.
  # Typical range: 1e-5 (very tight) to 1e-3 (loose)
  moment_tolerance: !!float 1e-4

  # Force residual scaling factor for optimization objective.
  # The course and normal forces are divided by this factor before optimization.
  # Smaller values (0.001) make forces more important in trim; larger values (0.1) de-weight them.
  # Typical range: 0.001 (forces critical) to 0.1 (moments critical)
  force_residual_scale: !!float 1


  # Search bounds for quasi-steady variables [physical units as noted]
  # These define the feasible region for the optimizer to explore.
  # Narrower bounds = fewer evaluations, faster convergence, but risk missing solutions.
  # Wider bounds = more thorough search but slower optimization.
  kite_speed_bounds_ms: !!seq [5.0, 50.0]      # m/s - apparent wind relative speed
  roll_bounds_deg: !!seq [-4.0, 4.0]            # degrees - wing roll angle
  pitch_bounds_deg: !!seq [-4.0, 4.0]           # degrees - pitch angle
  yaw_bounds_deg: !!seq [-4.0, 4.0]             # degrees - yaw angle
  course_rate_bounds_rad_s: !!seq [-2.5, 2.5]   # rad/s - angular velocity about vertical axis

## aerodynamic bridle
aerodynamic_bridle:
  cd_cable: !!float 1.1
  cf_cable: !!float 0.01

## structural pss
structural_pss:
  dt: !!float 0.005 #crucial that this remains low
  dt_max: !!float 0.01
  n_internal_time_steps: !!int 100 #was 20, then 200
  abs_tol: !!float 1.0e-50
  rel_tol: !!float 1.0e-5
  max_iter: !!int 500
  fixed_point_indices: [0] #this is the bridle point / KCU
  is_with_diagnostics: !!bool false
  num_node_diagnostics: !!int 34

## aero2struc
aero2struc:
  coupling_method: !!str 'NN'
  eps: !!float 1e-6
  power_for_inverse_weighting: !!float 2.0
  cp_distribution_path: data/LEI-V3-KITE/cp_distributions/cp_AOA_8.dat

## coupled
aero_structural_solver:
  max_iter: !!int 100
  it_check: !!int 5
  tol: !!float 5 #N
  is_with_aitken_relaxation: !!bool true
  relaxation_factor: !!float 0.5 #0.05-0.3
  n_max_constant_residual_force: !!int 10
  stagnation_tol: !!float 2 # N, tolerance for stagnation detection
  qs_state_stagnation_decimals: !!int 2 # stop if opt_x is unchanged at this rounding
  qs_state_stagnation_n_iter: !!int 30 # consecutive unchanged iterations required to stop (0 disables)
  aero_update_interval: !!int 1 # run aero every N structural iterations (1 = every iter, 5 = every 5th)
  steering_actuation_interval_iters: !!int 2 # apply steering actuation every N coupled iterations
  node_displacement_tol: !!float 0.0001 # stop if max nodal displacement < this [m] (0 = disabled, e.g. 1e-4)
  aero_solve_type: !!str 'qsm' # 'qsm' = quasi-steady optimization with system_model; 'level_1' = direct VSM with va_vector

## Physical constants
grav_constant: !!seq [0, 0, -9.81]
rho: !!float 1.225 # air density in kg/m^3
mu: !!float 1.789e-05 # dynamic viscosity in kg/(m*s)


## structural kite_fem
structural_kite_fem:
  max_iterations: !!int 200 #used to be 2000
  tolerance: !!float 0.01
  step_limit: !!float 0.2       # kite_fem default
  relax_init: !!float 0.5       # kite_fem default
  relax_update: !!float 0.95    # kite_fem default
  k_update: !!int 1
  I_stiffness: !!int 25         # kite_fem default
  is_with_diagnostics: !!bool false
  num_node_diagnostics: !!int 34
  # Regularizes K for Newton-Raphson stability. Does NOT affect
  # the equilibrium (fe=fi is independent of I_stiffness).
  # if pseudo_dt != 0 it overrides I_stiffness when set.
  pseudo_dt: !!float 0.1 #0.05 # pseudo-transient timestep [s] for mass-proportional regularization.
  k_reg_min: !!float 200.0 # minimum regularization stiffness [N/m] floor for light bridle/steering nodes
  print_info: !!bool false
  update_stiffness: !!bool true #Stiffen each spring with elongations higher than 1% on each iteration
  max_stiffness: !!int 5000 #Maximum value of spring stiffness, when updated using update_stiffness
  # relaxbridles: pre-simulation bridle relaxation applied once at initialisation.
  # pull_down_force_z pulls the KCU node (node 0) downward to tension the bridles
  # from the unloaded YAML geometry to a realistic hanging position.
  # A too-small force leaves bridles slack; too large may cause FEM divergence.
  relaxbridles_pull_down_force_z: !!float -1000.0
  relaxbridles_settle_force_z: !!float -100.0


