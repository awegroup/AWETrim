
##############################
## General ###################
##############################
bridle_point_node: [0,0,0] #[x,y,z] --> location of kcu

## Mass
pulley_mass: !!float 0.1 #[kg] #TODO: would be better to define these per pulley
kcu_mass: !!float 8.4 #[kg]

## Material properties
dyneema:
  # (M.B. Ruppert) [Pa]
  density: 724 #[kg/m^3] -> m = density * A * l0
  # 0.55 GPa is M.B. Ruppert 
  # SK75 dyneema has 109-132GPa, but that's for a single fiber, not braided rope.
  # Braided Dyneema rope: typically 20–60 GPa effective
  youngs_modulus: 20000000000 # 400MPa #3000000000 # 30GPa #550000000 #E:[Pa] -> k = E *A / l0
  damping_per_stiffness: 0.0 # [/s] -> c = damping_per_stiffness * k

fixed_point_indices: !!seq [0] # node indices that are fixed in space (0-based)

